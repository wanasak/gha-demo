name: Input Parameter
on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Environment to deploy to"
                required: true
                type: choice
                default: "staging"
                options:
                    - staging
                    - production
            artifact_tag:
                description: "Artifact tag"
                required: true
            
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to environment
              run: echo "Deploying the artifact ${{ inputs.artifact_tag }} to ${{ inputs.environment }}"